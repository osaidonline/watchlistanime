<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Anime Watchlist 🍿</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background-color: #121212; color: #ffffff; }
    .card { background-color: #1e1e1e; border: none; }
    .anime-img { height: 300px; object-fit: cover; border-radius: 8px 8px 0 0; }
    .loader { display: none; margin: 20px auto; }
  </style>
</head>
<body>

  <div class="bg-dark py-4 shadow-sm border-bottom border-secondary">
    <div class="container">
      <h3 class="mb-3">➕ Add Anime</h3>
      <form id="addAnimeForm" class="row g-2">
        <div class="col-md-3">
          <input type="text" id="name" class="form-control bg-secondary text-light border-0" placeholder="Anime Name" required>
        </div>
        <div class="col-md-3">
          <input type="url" id="img" class="form-control bg-secondary text-light border-0" placeholder="Image Link" required>
        </div>
        <div class="col-md-2">
          <input type="text" id="season" class="form-control bg-secondary text-light border-0" placeholder="Season (e.g., S1)" required>
        </div>
        <div class="col-md-2">
          <input type="password" id="pin" class="form-control bg-secondary text-light border-0" placeholder="Secret PIN" required>
        </div>
        <div class="col-md-2">
          <button type="submit" class="btn btn-primary w-100" id="submitBtn">Save</button>
        </div>
      </form>
      <div id="msg" class="mt-2 text-warning"></div>
    </div>
  </div>

  <div class="container mt-5">
    <h2 class="mb-4">🎥 My Watchlist</h2>
    
    <div class="spinner-border text-light loader" id="loader" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>

    <div class="row row-cols-1 row-cols-sm-2 row-cols-md-4 g-4" id="watchlistGrid">
      </div>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw8UlmjiGkkL9jK5tES9CYQ_Eu86FfO6cmKhDAsX8E-1OYscHU4NvYEHcGWmPq2erQNKw/exec"; 
    
    const form = document.getElementById('addAnimeForm');
    const grid = document.getElementById('watchlistGrid');
    const loader = document.getElementById('loader');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('submitBtn');

    // Load animes on startup
    async function loadWatchlist() {
      loader.style.display = 'block';
      grid.innerHTML = '';
      
      try {
        const response = await fetch(SCRIPT_URL);
        const animes = await response.json();
        
        animes.forEach(anime => {
          if(!anime.name) return; // Skip empty rows
          grid.innerHTML += `
            <div class="col">
              <div class="card h-100 shadow">
                <img src="${anime.img}" class="card-img-top anime-img" alt="${anime.name}" onerror="this.src='https://via.placeholder.com/300x400?text=No+Image'">
                <div class="card-body text-center">
                  <h5 class="card-title text-light">${anime.name}</h5>
                  <span class="badge bg-danger">${anime.season}</span>
                </div>
              </div>
            </div>
          `;
        });
      } catch (err) {
        msg.innerText = "Error loading watchlist.";
      }
      loader.style.display = 'none';
    }

    // Submit new anime
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      btn.disabled = true;
      btn.innerText = "Saving...";

      const data = {
        name: document.getElementById('name').value,
        img: document.getElementById('img').value,
        season: document.getElementById('season').value,
        pin: document.getElementById('pin').value
      };

      try {
        const response = await fetch(SCRIPT_URL, {
          method: 'POST',
          body: JSON.stringify(data)
        });
        
        const result = await response.json();
        
        if (result.status === "success") {
          msg.innerText = "Added successfully! ✅";
          form.reset();
          loadWatchlist(); // Refresh list
        } else {
          msg.innerText = "❌ " + result.message; // Shows wrong PIN error
        }
      } catch (err) {
        msg.innerText = "Network error. Make sure CORS is handled.";
      }
      
      btn.disabled = false;
      btn.innerText = "Save";
      setTimeout(() => msg.innerText = "", 3000);
    });

    // Init
    loadWatchlist();
  </script>
</body>
</html>
